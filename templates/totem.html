<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Totem de Senhas – SGFH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --azul: #1a6fc4; }
    body { background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn-totem { width: 220px; height: 120px; font-size: 1.2rem; font-weight: 700; border-radius: .75rem; border: none; }
    .senha-display { font-size: 5rem; font-weight: 900; color: var(--azul); }
    .btn-primary { background: var(--azul); border-color: var(--azul); }
  </style>
</head>
<body>
  <div class="text-center mb-4">
    <h1 class="fw-bold">Retire sua Senha</h1>
    <p class="text-muted">Selecione o tipo de atendimento:</p>
  </div>

  <div class="d-flex gap-4 flex-wrap justify-content-center">
    <button class="btn btn-primary btn-totem" onclick="gerarSenha('normal')">
      Atendimento<br>Normal
    </button>
    <button class="btn btn-danger btn-totem" onclick="gerarSenha('prioritario')">
      Atendimento<br>Prioritário
    </button>
  </div>

  <a href="/" class="mt-5 text-muted small">Voltar ao início</a>

  <!-- Modal -->
  <div class="modal fade" id="modalSenha" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow rounded-3">
        <div class="modal-body text-center py-5 px-4">
          <p class="text-muted fw-semibold mb-1">Sua senha é</p>
          <div class="senha-display" id="senhaGerada">—</div>
          <p class="text-muted small mt-3">Aguarde ser chamado(a) no painel.</p>
          <button class="btn btn-primary px-5 mt-2" onclick="bootstrap.Modal.getInstance(document.getElementById('modalSenha')).hide()">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function gerarSenha(tipo) {
      const resp = await fetch('/gerar_senha', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tipo })
      });
      const data = await resp.json();
      document.getElementById('senhaGerada').textContent = data.senha;
      new bootstrap.Modal(document.getElementById('modalSenha')).show();
    }
  </script>
</body>
</html>
