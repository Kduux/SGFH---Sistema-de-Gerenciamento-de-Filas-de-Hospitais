<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – SGFH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --azul: #1a6fc4; }
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: .75rem; max-width: 400px; width: 100%; }
    .btn-primary { background: var(--azul); border-color: var(--azul); }
  </style>
</head>
<body>
  <div class="card shadow-sm p-4 p-md-5 mx-3">
    <h2 class="fw-bold text-center mb-1">Login</h2>
    <p class="text-muted text-center small mb-4">Acesso do Atendente – SGFH</p>

    {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form action="/logar" method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">E-mail</label>
        <input type="email" name="email" class="form-control" placeholder="funcionario@hospital.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Senha</label>
        <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <hr class="my-3">
    <div class="text-center">
      <a href="/cadastro" class="text-muted small">Primeiro acesso? Cadastre-se</a><br>
      <a href="/" class="text-muted small">Voltar ao início</a>
    </div>
  </div>
</body>
</html>
