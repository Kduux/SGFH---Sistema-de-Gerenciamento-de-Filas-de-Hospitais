<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGFH – Sistema de Gestão de Filas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --azul: #1a6fc4; }
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: .75rem; }
    .btn-primary { background: var(--azul); border-color: var(--azul); }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-5">
      <h1 class="fw-bold">Sistema de Gestão de Filas</h1>
      <p class="text-muted">Hospital – SGFH</p>
    </div>

    <div class="row g-4 justify-content-center">
      <div class="col-12 col-md-5">
        <div class="card shadow-sm p-4 text-center">
          <h2 class="fw-bold mb-2">Totem de Senhas</h2>
          <p class="text-muted">Retire aqui sua senha de atendimento.</p>
          <a href="/totem" class="btn btn-primary mt-2">Acessar Totem</a>
        </div>
      </div>

      <div class="col-12 col-md-5">
        <div class="card shadow-sm p-4 text-center">
          <h2 class="fw-bold mb-2">Painel do Atendente</h2>
          <p class="text-muted">Área exclusiva para funcionários.</p>
          <a href="/login" class="btn btn-primary mt-2">Fazer Login</a>
        </div>
      </div>
    </div>

    <div class="text-center mt-4">
      <a href="/painel" class="text-muted small">Abrir Display de TV</a>
    </div>
  </div>
</body>
</html>
